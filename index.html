<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ค้นหาชื่อผู้เข้าอบรม</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 24px;
      color: #222;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      background: #ffffff;
      padding: 28px;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 24px;
      font-size: 16px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      font-size: 20px;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #ccc;
      outline: none;
      margin-bottom: 18px;
    }

    input:focus {
      border-color: #3367d6;
      box-shadow: 0 0 0 3px rgba(51,103,214,0.15);
    }

    .result {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .name-card {
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #e0e0e0;
      background: #fafafa;
      cursor: pointer;
      font-size: 18px;
    }

    .name-card:hover {
      background: #eef3ff;
      border-color: #3367d6;
    }

    .empty {
      text-align: center;
      color: #888;
      padding: 20px;
    }

    .note {
      margin-top: 18px;
      text-align: center;
      font-size: 14px;
      color: #777;
    }

    .count {
      margin-bottom: 12px;
      color: #555;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>ค้นหาชื่อผู้เข้าอบรม</h1>
    <div class="subtitle">
      พิมพ์บางส่วนของชื่อหรือนามสกุล แล้วเลือกชื่อของท่าน
    </div>

    <input
      type="text"
      id="searchInput"
      placeholder="พิมพ์ชื่อหรือนามสกุล เช่น อรุณรัตน์"
      autocomplete="off"
      disabled
    />

    <div id="count" class="count"></div>
    <div id="result" class="result"></div>

    <div class="note">
      เมื่อเลือกชื่อแล้ว ระบบจะเปิด Google Form พร้อมกรอกชื่อให้อัตโนมัติ
    </div>
  </div>

  <script>
    // URL Google Form แบบ prefilled
    const PREFILL_URL = "https://docs.google.com/forms/d/e/1FAIpQLSfIUDQHCrhcDUvgkr7JHAdMm5YUfsOPX0pj4aKcD4TYD1bg9Q/viewform?usp=dialog";

    // ช่องชื่อผู้เข้าอบรมใน Google Form
    const NAME_ENTRY_ID = "entry.1710551175";

    let names = [];

    const searchInput = document.getElementById("searchInput");
    const resultDiv = document.getElementById("result");
    const countDiv = document.getElementById("count");

    function normalizeText(text) {
      return text
        .toString()
        .replace(/\u200B/g, "")
        .replace(/\u200C/g, "")
        .replace(/\u200D/g, "")
        .replace(/\uFEFF/g, "")
        .replace(/\s+/g, " ")
        .trim()
        .toLowerCase();
    }

    async function loadNames() {
      try {
        resultDiv.innerHTML = `<div class="empty">กำลังโหลดรายชื่อ...</div>`;

        const response = await fetch("names.json", {
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error("โหลด names.json ไม่สำเร็จ");
        }

        const data = await response.json();

        names = Array.isArray(data.names) ? data.names : [];

        names = names
          .map(name => normalizeDisplayName(name))
          .filter(name => name !== "");

        names = [...new Set(names)];

        searchInput.disabled = false;
        searchInput.focus();

        countDiv.textContent = `มีรายชื่อทั้งหมด ${names.length} คน`;
        resultDiv.innerHTML = `<div class="empty">กรุณาพิมพ์ชื่อหรือนามสกุลเพื่อค้นหา</div>`;
      } catch (error) {
        console.error(error);
        countDiv.textContent = "";
        resultDiv.innerHTML = `
          <div class="empty">
            โหลดรายชื่อไม่สำเร็จ<br>
            กรุณาตรวจสอบว่าไฟล์ names.json อยู่ในโฟลเดอร์เดียวกับ index.html
          </div>
        `;
      }
    }

    function normalizeDisplayName(text) {
      return text
        .toString()
        .replace(/\u200B/g, "")
        .replace(/\u200C/g, "")
        .replace(/\u200D/g, "")
        .replace(/\uFEFF/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function renderResults(keyword = "") {
      const text = normalizeText(keyword);
      resultDiv.innerHTML = "";
      countDiv.textContent = "";

      if (!text) {
        resultDiv.innerHTML = `<div class="empty">กรุณาพิมพ์ชื่อหรือนามสกุลเพื่อค้นหา</div>`;
        countDiv.textContent = `มีรายชื่อทั้งหมด ${names.length} คน`;
        return;
      }

      const filteredNames = names.filter(name =>
        normalizeText(name).includes(text)
      );

      countDiv.textContent = `พบ ${filteredNames.length} รายชื่อ`;

      if (filteredNames.length === 0) {
        resultDiv.innerHTML = `<div class="empty">ไม่พบรายชื่อที่ค้นหา</div>`;
        return;
      }

      filteredNames.forEach(name => {
        const div = document.createElement("div");
        div.className = "name-card";
        div.textContent = name;

        div.addEventListener("click", () => {
          openGoogleForm(name);
        });

        resultDiv.appendChild(div);
      });
    }

    function openGoogleForm(name) {
      const url = new URL(PREFILL_URL);

      // เปลี่ยนเฉพาะ field ชื่อผู้เข้าอบรม
      url.searchParams.set(NAME_ENTRY_ID, name);

      window.location.href = url.toString();
    }

    searchInput.addEventListener("input", function () {
      renderResults(this.value);
    });

    loadNames();
  </script>
</body>
</html>
